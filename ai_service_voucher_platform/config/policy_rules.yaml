version: "2026-09"
source: "人工校准"
description: "广西制造业企业培优育强服务券审核规则预设库。"

support_directions:
  - id: "SD001"
    name: "智能制造系统集成"
    keywords: ["工业软件", "MES", "ERP", "数字化转型", "产线改造", "数字孪生", "检验检测"]
    description: "为制造业企业提供智能化改造、优化生产流程的服务。"
  - id: "SD002"
    name: "绿色化改造"
    keywords: ["节能减排", "绿色工厂", "碳排放", "清洁生产"]
    description: "帮助企业实现节能降耗、绿色低碳发展。"

excluded_services:
  - id: "ES001"
    name: "通用IT或非制造业服务"
    keywords: ["办公软件", "网站建设", "通用IT培训", "市场拓展", "宣传推广", "参与展会"]
    description: "不具备制造业核心属性的通用软硬件或商业营销服务。"

conditional_approval_scenarios:
  - id: "CA001"
    cause: "服务描述过于模糊，缺乏制造业具体场景或量化指标"
    trigger_keywords: ["提高效率", "优化管理", "技术升级", "提供支持"]
    suggestion_template: "服务内容描述不够具体。根据政策要求，请补充说明：1.具体的工业应用场景（例如：应用于某条生产线）；2.可量化的交付物或验收指标（例如：系统上线后，产品良品率提升5%）；3.详细的交付清单。"